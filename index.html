<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona 3 Daily Tracker</title>

<style>
:root{

    /* MASTER SCALE */
    --size:0.8;

    --bg:#7fb5f5;

    --blue-dark:#062f56;
    --blue:#0f4d89;
    --blue-light:#2f8cff;

    --white:#f4f9ff;

    --gold:#ffd15a;

    --shadow:rgba(0,0,0,.15);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    font-family:Georgia, serif;
    color:var(--blue-dark);
}

.app{

    width:calc(820px * var(--size));

    margin:
        calc(20px * var(--size))
        auto;
}

/* ======================
   HEADER
====================== */

.top{

    height:calc(58px * var(--size));

    background:var(--blue-dark);

    color:white;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:
        0
        calc(18px * var(--size));

    border-bottom:
        calc(4px * var(--size))
        solid
        var(--blue-light);

    text-transform:uppercase;
}

.date-wrap{
    display:flex;
    align-items:flex-end;
}

.date-num{

    font-size:
        calc(2.2rem * var(--size));

    font-weight:900;

    line-height:1;
}

.date-day{

    margin-left:
        calc(8px * var(--size));

    margin-bottom:
        calc(4px * var(--size));

    font-size:
        calc(.85rem * var(--size));

    letter-spacing:.08em;
}

.percent{

    font-size:
        calc(1.2rem * var(--size));

    font-weight:700;
}

/* ======================
   PANEL
====================== */

.panel{

    position:relative;

    display:flex;

    background:#8dbef7;

    border-top:
        calc(14px * var(--size))
        solid
        var(--blue-light);

    overflow:hidden;

    min-height:
        calc(420px * var(--size));
}

/* Decorative Shape */

.shape{

    position:absolute;

    right:
        calc(-60px * var(--size));

    top:
        calc(-50px * var(--size));

    width:
        calc(220px * var(--size));

    height:
        calc(220px * var(--size));

    background:white;

    opacity:.12;

    transform:rotate(35deg);
}

/* ======================
   SIDE LABEL
====================== */

.side{

    writing-mode:vertical-rl;

    transform:rotate(180deg);

    font-size:
        calc(6.4rem * var(--size));

    font-weight:900;

    letter-spacing:-0.08em;

    color:white;

    opacity:.28;

    padding:
        calc(12px * var(--size))
        calc(8px * var(--size));

    line-height:.8;

    user-select:none;
}

/* ======================
   CONTENT
====================== */

.content{

    flex:1;

    padding:
        calc(18px * var(--size));

    position:relative;

    z-index:2;
}

/* ======================
   HABITS
====================== */

.habit{

    display:flex;
    justify-content:space-between;
    align-items:center;

    min-height:
        calc(46px * var(--size));

    padding:
        0
        calc(14px * var(--size));

    margin-bottom:
        calc(5px * var(--size));

    background:
        rgba(6,47,86,.12);

    border-left:
        calc(6px * var(--size))
        solid
        transparent;

    transition:.15s;

    cursor:pointer;
}

.habit:hover{

    border-left-color:
        var(--gold);

    background:
        rgba(255,255,255,.45);
}

.habit.done{
    color:var(--gold);
}

.habit-name{

    font-size:
        calc(1rem * var(--size));

    font-weight:700;

    letter-spacing:.02em;
}

.right{

    display:flex;
    align-items:center;

    gap:
        calc(12px * var(--size));
}

/* ======================
   CHECK
====================== */

.check{

    width:
        calc(16px * var(--size));

    height:
        calc(16px * var(--size));

    border-radius:50%;

    border:
        calc(2px * var(--size))
        solid
        var(--blue-dark);
}

.check.filled{

    background:var(--gold);

    border-color:var(--gold);

    box-shadow:
        0 0
        calc(10px * var(--size))
        rgba(255,209,90,.6);
}

/* ======================
   DELETE
====================== */

.delete{

    border:none;

    background:none;

    color:#d94f67;

    cursor:pointer;

    font-size:
        calc(1rem * var(--size));
}

.delete:hover{
    transform:scale(1.15);
}

/* ======================
   STATUS
====================== */

.status-bar{

    margin-top:
        calc(14px * var(--size));

    display:flex;
    justify-content:space-between;

    font-size:
        calc(.8rem * var(--size));

    font-weight:700;

    letter-spacing:.1em;

    text-transform:uppercase;
}

.progress{

    height:
        calc(8px * var(--size));

    background:
        rgba(6,47,86,.15);

    margin-top:
        calc(6px * var(--size));
}

.fill{

    height:100%;

    width:0;

    background:var(--gold);

    transition:.2s;
}

/* ======================
   BUTTONS
====================== */

.actions{

    margin-top:
        calc(16px * var(--size));

    display:flex;

    gap:
        calc(8px * var(--size));
}

button{

    border:none;

    background:var(--blue-dark);

    color:white;

    padding:
        calc(8px * var(--size))
        calc(14px * var(--size));

    cursor:pointer;

    text-transform:uppercase;

    letter-spacing:.08em;

    font-size:
        calc(.75rem * var(--size));
}

button:hover{

    background:
        var(--blue-light);
}
</style>
</head>
<body>

<div class="app">

    <div class="top">

        <div class="date-wrap">
            <div class="date-num" id="dateNum"></div>
            <div class="date-day" id="dateDay"></div>
        </div>

        <div class="percent" id="percent">0%</div>

    </div>

    <div class="panel">

        <div class="shape"></div>

        <div class="side">DAILY</div>

        <div class="content">

            <div id="list"></div>

            <div class="status-bar">
                <span>Completion Rate</span>
                <span id="completionText">0%</span>
            </div>

            <div class="progress">
                <div class="fill" id="fill"></div>
            </div>

            <div class="actions">
                <button onclick="addHabit()">Add</button>
                <button onclick="resetDay()">Reset</button>
            </div>

        </div>

    </div>

</div>

<script>

/* ======================
   DATE
====================== */

const now = new Date();

const days = [
"SUN","MON","TUE","WED","THU","FRI","SAT"
];

document.getElementById("dateNum").textContent =
`${now.getMonth()+1}/${now.getDate()}`;

document.getElementById("dateDay").textContent =
days[now.getDay()];

/* ======================
   STORAGE
====================== */

const today =
new Date().toISOString().split("T")[0];

let data =
JSON.parse(localStorage.getItem("persona_tracker")) || {};

if(!data[today]){

    data[today]={

        habits:[
            "Exercise",
            "Read",
            "Study"
        ],

        done:{}
    };
}

let day = data[today];

function save(){

    localStorage.setItem(
        "persona_tracker",
        JSON.stringify(data)
    );
}

/* ======================
   DELETE
====================== */

function deleteHabit(name){

    delete day.done[name];

    day.habits =
    day.habits.filter(
        h => h !== name
    );

    save();
    render();
}

/* ======================
   RENDER
====================== */

function render(){

    const list =
    document.getElementById("list");

    list.innerHTML="";

    let completed = 0;

    day.habits.forEach(h=>{

        const done = day.done[h];

        if(done) completed++;

        const div =
        document.createElement("div");

        div.className =
        "habit" + (done ? " done" : "");

        div.innerHTML = `
        <div class="habit-name">
            ${h}
        </div>

        <div class="right">

            <div class="check ${done ? "filled" : ""}"></div>

            <button class="delete">
                ✕
            </button>

        </div>
        `;

        div.onclick=(e)=>{

            if(
                e.target.classList.contains("delete")
            ) return;

            day.done[h] = !done;

            save();
            render();
        };

        div.querySelector(".delete")
        .onclick=(e)=>{

            e.stopPropagation();

            deleteHabit(h);
        };

        list.appendChild(div);
    });

    const percent =
    Math.round(
        (completed / day.habits.length) * 100
    ) || 0;

    document.getElementById("percent")
    .textContent = percent + "%";

    document.getElementById("completionText")
    .textContent = percent + "%";

    document.getElementById("fill")
    .style.width = percent + "%";
}

/* ======================
   ADD HABIT
====================== */

function addHabit(){

    const habit =
    prompt("New Habit");

    if(!habit) return;

    if(
        day.habits.includes(habit)
    ) return;

    day.habits.push(habit);

    save();
    render();
}

/* ======================
   RESET
====================== */

function resetDay(){

    day.done = {};

    save();
    render();
}

render();

</script>

</body>
</html>
