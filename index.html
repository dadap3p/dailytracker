<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Persona 3 Daily Tracker</title>

<style>

:root{
    --bg:#8cbaf6;

    --blue-dark:#062f56;
    --blue:#0f4d89;
    --blue-light:#2f8cff;

    --gold:#ffd15a;

    --white:#f5f9ff;

    --panel:#8dbef7;

    --shadow:rgba(0,0,0,.15);

    --radius:12px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    font-family:Georgia, serif;
    color:var(--blue-dark);
    min-height:100vh;
}

.app{
    width:min(100%,1000px);
    margin:auto;
    container-type:inline-size;
}

/* =====================
   TOP BAR
===================== */

.top{

    background:var(--blue-dark);

    color:white;

    border-bottom:6px solid var(--blue-light);

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:1rem 1.5rem;
}

.date-wrap{
    display:flex;
    align-items:flex-end;
    gap:.5rem;
}

.date-num{
    font-size:clamp(2rem,5vw,3.5rem);
    font-weight:900;
    line-height:1;
}

.date-day{
    font-size:clamp(.8rem,2vw,1rem);
    margin-bottom:.35rem;
    letter-spacing:.12em;
}

.percent{
    font-size:clamp(1rem,3vw,1.6rem);
    font-weight:bold;
}

/* =====================
   PANEL
===================== */

.panel{

    position:relative;

    min-height:500px;

    background:var(--panel);

    overflow:hidden;

    display:grid;

    grid-template-columns:120px 1fr;
}

/* Persona decorative bars */

.panel::before{

    content:"";

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:70px;

    background:var(--blue-light);
}

.panel::after{

    content:"";

    position:absolute;

    bottom:0;
    left:0;

    width:100%;
    height:45px;

    background:var(--blue-light);
}

/* Decorative shape */

.shape{

    position:absolute;

    top:-120px;
    right:-80px;

    width:300px;
    height:300px;

    background:white;

    opacity:.12;

    transform:rotate(35deg);

    z-index:0;
}

/* Optional silhouette */

.silhouette{

    position:absolute;

    left:0;
    bottom:0;

    width:40%;
    height:100%;

    opacity:.12;

    pointer-events:none;

    z-index:0;

    background-size:contain;
    background-position:left bottom;
    background-repeat:no-repeat;

    /*
    background-image:url("silhouette.png");
    */
}

/* =====================
   SIDE TEXT
===================== */

.side{

    writing-mode:vertical-rl;

    transform:rotate(180deg);

    color:white;

    opacity:.28;

    font-weight:900;

    font-size:clamp(3rem,8vw,7rem);

    letter-spacing:-0.08em;

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:2;

    user-select:none;
}

/* =====================
   CONTENT
===================== */

.content{

    position:relative;

    z-index:2;

    padding:2rem;

    display:flex;
    flex-direction:column;
}

#list{
    display:flex;
    flex-direction:column;
    gap:.5rem;
}

/* =====================
   HABITS
===================== */

.habit{

    min-height:58px;

    display:grid;

    grid-template-columns:1fr auto;

    align-items:center;

    gap:1rem;

    background:rgba(6,47,86,.08);

    border-left:6px solid transparent;

    padding:0 1rem;

    transition:.2s;

    cursor:pointer;
}

.habit:hover{

    background:rgba(255,255,255,.45);

    border-left-color:var(--gold);
}

.habit.done{
    color:var(--gold);
}

.habit-name{

    font-size:1rem;

    font-weight:bold;

    overflow:hidden;
    text-overflow:ellipsis;
}

.right{

    display:flex;
    align-items:center;

    gap:1rem;
}

/* =====================
   CHECK
===================== */

.check{

    width:18px;
    height:18px;

    border-radius:50%;

    border:2px solid var(--blue-dark);
}

.check.filled{

    background:var(--gold);

    border-color:var(--gold);

    box-shadow:0 0 12px rgba(255,209,90,.8);
}

/* =====================
   DELETE
===================== */

.delete{

    background:none;

    border:none;

    color:#d94f67;

    font-size:1rem;

    cursor:pointer;
}

/* =====================
   STATUS
===================== */

.status-bar{

    margin-top:1.5rem;

    display:flex;
    justify-content:space-between;

    text-transform:uppercase;

    letter-spacing:.1em;

    font-weight:bold;
}

.progress{

    margin-top:.5rem;

    height:10px;

    background:rgba(6,47,86,.15);
}

.fill{

    height:100%;

    width:0;

    background:var(--gold);

    transition:.3s;
}

/* =====================
   BUTTONS
===================== */

.actions{

    margin-top:1.5rem;

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:.75rem;
}

button{

    min-height:44px;

    border:none;

    background:var(--blue-dark);

    color:white;

    cursor:pointer;

    text-transform:uppercase;

    letter-spacing:.08em;
}

button:hover{
    background:var(--blue-light);
}

/* =====================
   RESPONSIVE
===================== */

@container (max-width:700px){

    .panel{
        grid-template-columns:1fr;
    }

    .side{

        writing-mode:horizontal-tb;

        transform:none;

        font-size:2rem;

        padding:1rem 0;
    }

    .content{
        padding:1rem;
    }

    .silhouette{
        width:100%;
        opacity:.06;
    }
}

@media (max-width:700px){

    .top{
        padding:1rem;
    }

    .actions{
        grid-template-columns:1fr;
    }

    .habit-name{
        white-space:normal;
    }
}

</style>
</head>
<body>

<div class="app">

    <div class="top">

        <div class="date-wrap">

            <div class="date-num" id="dateNum"></div>

            <div class="date-day" id="dateDay"></div>

        </div>

        <div class="percent" id="percent">0%</div>

    </div>

    <div class="panel">

        <div class="shape"></div>

        <div class="silhouette"></div>

        <div class="side">SYSTEM</div>

        <div class="content">

            <div id="list"></div>

            <div class="status-bar">

                <span>Completion Rate</span>

                <span id="completionText">0%</span>

            </div>

            <div class="progress">

                <div class="fill" id="fill"></div>

            </div>

            <div class="actions">

                <button onclick="addHabit()">
                    Add Habit
                </button>

                <button onclick="resetDay()">
                    Reset Day
                </button>

            </div>

        </div>

    </div>

</div>

<script>

/* DATE */

const now = new Date();

const days = [
"SUN","MON","TUE","WED","THU","FRI","SAT"
];

document.getElementById("dateNum").textContent =
`${now.getMonth()+1}/${now.getDate()}`;

document.getElementById("dateDay").textContent =
days[now.getDay()];

/* STORAGE */

const today =
new Date().toISOString().split("T")[0];

let data =
JSON.parse(localStorage.getItem("persona_tracker")) || {};

if(!data[today]){

    data[today]={

        habits:[
            "Exercise",
            "Read",
            "Study"
        ],

        done:{}
    };
}

let day = data[today];

function save(){

    localStorage.setItem(
        "persona_tracker",
        JSON.stringify(data)
    );
}

function deleteHabit(name){

    delete day.done[name];

    day.habits =
    day.habits.filter(
        h => h !== name
    );

    save();

    render();
}

function render(){

    const list =
    document.getElementById("list");

    list.innerHTML="";

    let completed = 0;

    day.habits.forEach(h=>{

        const done = day.done[h];

        if(done) completed++;

        const div =
        document.createElement("div");

        div.className =
        "habit" + (done ? " done" : "");

        div.innerHTML = `
            <div class="habit-name">${h}</div>

            <div class="right">

                <div class="check ${done ? "filled" : ""}"></div>

                <button class="delete">✕</button>

            </div>
        `;

        div.onclick=(e)=>{

            if(
                e.target.classList.contains("delete")
            ) return;

            day.done[h] = !done;

            save();

            render();
        };

        div.querySelector(".delete")
        .onclick=(e)=>{

            e.stopPropagation();

            deleteHabit(h);
        };

        list.appendChild(div);
    });

    const percent =
    Math.round(
        (completed/day.habits.length)*100
    ) || 0;

    document.getElementById("percent")
    .textContent =
    percent + "%";

    document.getElementById("completionText")
    .textContent =
    percent + "%";

    document.getElementById("fill")
    .style.width =
    percent + "%";
}

function addHabit(){

    const habit =
    prompt("New Habit");

    if(!habit) return;

    if(
        day.habits.includes(habit)
    ) return;

    day.habits.push(habit);

    save();

    render();
}

function resetDay(){

    day.done = {};

    save();

    render();
}

render();

</script>

</body>
</html>
