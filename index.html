<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>P3P Daily Tracker</title>

<style>

:root{
    --scale:0.65;

    --bg:#7DB3F2;
    --panel:#063B63;
    --panel2:#2C8BEB;
    --gold:#FFC94A;
    --text:#06243A;
}

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Georgia, serif; /* ← reverted font */
}

body{
    background:var(--bg);
    color:var(--text);
}

/* APP WRAPPER */
.app{
    width:min(calc(820px * var(--scale)), 95%);
    margin:20px auto;
}

/* TOP BAR */
.top{
    background:linear-gradient(
        90deg,
        var(--panel),
        #0a4a78
    );

    color:#bfe3ff;

    padding:calc(12px * var(--scale));

    font-size:calc(1.3rem * var(--scale));
    font-weight:600;
    letter-spacing:0.05em;

    display:flex;
    justify-content:space-between;

    border-bottom:2px solid rgba(255,255,255,0.15);
}

/* PANEL */
.panel{
    display:flex;
    background:rgba(255,255,255,0.15);
    border-top:10px solid var(--panel2);
}

/* SIDE LABEL */
.side{
    writing-mode:vertical-rl;
    transform:rotate(180deg);

    font-size:calc(6rem * var(--scale));
    font-weight:900;
    letter-spacing:0.2em;

    opacity:0.35;

    padding:calc(14px * var(--scale));

    color:#0b2f4a;

    text-shadow:
        0 0 10px rgba(255,255,255,0.2);
}
/* CONTENT */
.content{
    flex:1;
    padding:calc(16px * var(--scale));
}

/* HABIT ROW */
.habit{
    display:flex;
    justify-content:space-between;
    align-items:center;

    font-size:calc(1.05rem * var(--scale));
    font-weight:600;

    padding:calc(8px * var(--scale));
    margin-bottom:calc(6px * var(--scale));

    cursor:pointer;
    transition:0.15s;
}

.habit:hover{
    transform:translateX(6px);
}

.habit.done{
    color:var(--gold);
    text-shadow:0 0 8px rgba(255,201,74,0.4);
}

/* CHECKBOX */
.check{
    width:calc(14px * var(--scale));
    height:calc(14px * var(--scale));
    border:2px solid var(--panel);
}

.check.filled{
    background:var(--gold);
    border-color:var(--gold);
}

/* DELETE BUTTON */
.delete{
    margin-left:10px;
    background:transparent;
    border:none;
    color:#ff4d6d;
    font-size:calc(1rem * var(--scale));
    cursor:pointer;
    opacity:0.6;
}

.delete:hover{
    opacity:1;
    transform:scale(1.1);
}

/* PROGRESS */
.progress{
    height:6px;
    background:#6fa8e6;
    margin-top:10px;
}

.fill{
    height:100%;
    background:var(--gold);
    width:0%;
}

/* BUTTONS */
.actions{
    margin-top:10px;
    display:flex;
    gap:8px;
}

button{
    border:none;
    cursor:pointer;
    padding:calc(8px * var(--scale));
    background:var(--panel);
    color:white;
    font-size:calc(0.9rem * var(--scale));
}

button:hover{
    background:#042a48;
}

</style>
</head>

<body>

<div class="app">

    <div class="top">
        <div id="date"></div>
        <div id="percent"></div>
    </div>

    <div class="panel">

        <div class="side">DAILY</div>

        <div class="content">

            <div id="list"></div>

            <div class="progress">
                <div class="fill" id="fill"></div>
            </div>

            <div class="actions">
                <button onclick="addHabit()">Add</button>
                <button onclick="resetDay()">Reset</button>
            </div>

        </div>

    </div>

</div>

<script>

/* ======================
   DATE SYSTEM
====================== */

const today =
new Date().toISOString().split("T")[0];

const monthNames = [
"Jan","Feb","Mar","Apr","May","Jun",
"Jul","Aug","Sep","Oct","Nov","Dec"
];

document.getElementById("date").textContent =
`${monthNames[new Date().getMonth()]} ${new Date().getDate()}`;

/* ======================
   STORAGE
====================== */

let data =
JSON.parse(localStorage.getItem("p3p_daily")) || {};

if(!data[today]){
    data[today] = {
        habits:["Exercise","Read","Study"],
        done:{}
    };
}

let day = data[today];

/* ======================
   SAVE
====================== */

function save(){
    localStorage.setItem("p3p_daily", JSON.stringify(data));
}

/* ======================
   DELETE HABIT
====================== */

function deleteHabit(name){

    delete day.done[name];

    day.habits =
    day.habits.filter(h => h !== name);

    save();
    render();

}

/* ======================
   RENDER
====================== */

function render(){

    const list = document.getElementById("list");
    list.innerHTML = "";

    let completed = 0;

    day.habits.forEach((h,i)=>{

        const isDone = day.done[h];

        if(isDone) completed++;

        const div = document.createElement("div");
        div.className = "habit" + (isDone ? " done" : "");

        div.innerHTML = `
            <div>${isDone ? "✓ " : ""}${h}</div>

            <div style="display:flex;align-items:center;gap:8px;">
                <div class="check ${isDone ? "filled" : ""}"></div>
                <button class="delete">✕</button>
            </div>
        `;

        div.onclick = (e)=>{

            if(e.target.classList.contains("delete")) return;

            day.done[h] = !day.done[h];
            save();
            render();

        };

        div.querySelector(".delete").onclick = (e)=>{
            e.stopPropagation();
            deleteHabit(h);
        };

        list.appendChild(div);

    });

    const percent =
    Math.round((completed / day.habits.length) * 100) || 0;

    document.getElementById("percent").textContent =
    `${percent}%`;

    document.getElementById("fill").style.width =
    percent + "%";

}

/* ======================
   ADD HABIT
====================== */

function addHabit(){

    const name = prompt("New Habit:");

    if(!name) return;

    if(day.habits.includes(name)) return;

    day.habits.push(name);
    save();
    render();

}

/* ======================
   RESET DAY
====================== */

function resetDay(){
    day.done = {};
    save();
    render();
}

/* ======================
   INIT
====================== */

render();

</script>

</body>
</html>
