<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Persona Daily Tracker</title>

<style>

:root{
    --bg:#7DB3F2;
    --panel:#053B62;
    --panel2:#2C8BEB;
    --gold:#FFC94A;
    --text:#082742;
    --white:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Georgia, serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    overflow:hidden;
}

.top-bar{
    height:50px;
    background:var(--panel);
    color:#8CC4FF;

    display:flex;
    align-items:center;
    justify-content:flex-end;

    padding-right:30px;

    font-size:2rem;
    letter-spacing:2px;
}

.bottom-bar{
    position:fixed;
    bottom:0;
    left:0;

    width:100%;
    height:45px;

    background:var(--panel2);
}

.container{
    height:calc(100vh - 95px);

    display:flex;
    position:relative;
}

.vertical{
    writing-mode:vertical-rl;

    transform:rotate(180deg);

    font-size:8rem;
    font-weight:bold;

    color:white;

    opacity:.25;

    padding:20px;
}

.content{
    flex:1;

    display:flex;

    justify-content:center;

    align-items:center;
}

.panel{

    width:min(850px,90%);

    background:rgba(255,255,255,.15);

    border-top:20px solid var(--panel2);

    padding:30px;

    position:relative;
}

.menu{
    width:100%;
}

.menu-item{

    font-size:2rem;

    padding:12px 20px;

    margin-bottom:8px;

    transition:.15s;

    cursor:pointer;
}

.menu-item:hover{
    transform:translateX(8px);
}

.menu-item.selected{

    background:var(--panel);

    color:var(--gold);
}

.menu-item.completed{

    color:#0c6f26;
}

.description{

    margin-top:35px;

    font-size:1.3rem;

    min-height:70px;
}

.stats{

    margin-top:20px;

    font-size:1.1rem;

    color:var(--panel);
}

.add-btn{

    margin-top:20px;

    background:var(--panel);

    color:white;

    border:none;

    padding:12px 18px;

    cursor:pointer;
}

.footer-help{

    position:fixed;

    right:25px;
    bottom:55px;

    font-size:1.2rem;
}

.footer-help span{
    margin-left:15px;
}

@media(max-width:700px){

.vertical{
    font-size:4rem;
}

.menu-item{
    font-size:1.3rem;
}

.description{
    font-size:1rem;
}

}

</style>
</head>
<body>

<div class="top-bar">
□ What will you do today?
</div>

<div class="container">

<div class="vertical">
DAILY
</div>

<div class="content">

<div class="panel">

<div id="menu" class="menu"></div>

<div id="description" class="description">
Select a habit and press Enter to mark it complete.
</div>

<div id="stats" class="stats"></div>

<button id="addHabit" class="add-btn">
Add Habit
</button>

</div>

</div>

</div>

<div class="bottom-bar"></div>

<div class="footer-help">
<span>A Confirm</span>
<span>B Back</span>
</div>

<script>

// ===== DAILY STORAGE =====

const today =
new Date().toISOString().split("T")[0];

const descriptions = {
Exercise:"Build physical strength and stamina.",
Read:"Expand knowledge and improve focus.",
Study:"Invest in long-term growth.",
Meditate:"Improve clarity and mindfulness.",
Journal:"Reflect on your day."
};

let saveData =
JSON.parse(
localStorage.getItem("p3pDailyTracker")
) || {};

if(!saveData[today]){

saveData[today]={
habits:[
"Exercise",
"Read",
"Study",
"Meditate"
],
completed:{}
};

save();

}

let tracker =
saveData[today];

function save(){

localStorage.setItem(
"p3pDailyTracker",
JSON.stringify(saveData)
);

}

let selected = 0;

const menu =
document.getElementById("menu");

const description =
document.getElementById("description");

const stats =
document.getElementById("stats");

function render(){

menu.innerHTML="";

tracker.habits.forEach((habit,index)=>{

const item =
document.createElement("div");

item.className =
"menu-item";

if(index===selected){
item.classList.add("selected");
}

if(
tracker.completed[habit]
){
item.classList.add("completed");
item.innerHTML =
"✓ " + habit;
}else{
item.textContent =
habit;
}

item.onclick=()=>{

selected=index;
toggleHabit();
render();

};

menu.appendChild(item);

});

const currentHabit =
tracker.habits[selected];

description.textContent =
descriptions[currentHabit]
||
"Complete this task today.";

const completedCount =
Object.values(
tracker.completed
).filter(Boolean).length;

const percent =
Math.round(
(completedCount /
tracker.habits.length)
*100
);

stats.innerHTML = `
TODAY<br>
${completedCount} / ${tracker.habits.length}
Completed<br>
${percent}%
`;

save();

}

function toggleHabit(){

const habit =
tracker.habits[selected];

tracker.completed[habit] =
!tracker.completed[habit];

}

document.addEventListener(
"keydown",
e=>{

if(
e.key==="ArrowDown"
){

selected++;

if(
selected>=tracker.habits.length
){
selected=0;
}

render();

}

if(
e.key==="ArrowUp"
){

selected--;

if(
selected<0
){
selected=
tracker.habits.length-1;
}

render();

}

if(
e.key==="Enter"
){

toggleHabit();
render();

}

}
);

document
.getElementById("addHabit")
.onclick=()=>{

const name =
prompt(
"New Habit:"
);

if(!name) return;

tracker.habits.push(name);

save();
render();

};

render();

</script>

</body>
</html>
