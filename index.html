<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>P3P Daily Tracker</title>

<style>

:root{
    --scale:0.65;

    --bg:#7DB3F2;
    --panel:#063B63;
    --panel2:#2C8BEB;
    --gold:#FFC94A;
    --text:#06243A;
    --white:#fff;
}

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Georgia, serif;
}

body{
    background:var(--bg);
    color:var(--text);
}

/* WRAPPER */
.app{
    width:min(calc(820px * var(--scale)), 95%);
    margin:20px auto;
}

/* TOP BAR */
.top{
    background:var(--panel);
    color:#9fd0ff;

    padding:calc(10px * var(--scale));
    font-size:calc(1.4rem * var(--scale));

    display:flex;
    justify-content:space-between;
}

/* MAIN PANEL */
.panel{
    display:flex;
    background:rgba(255,255,255,0.15);
    border-top:10px solid var(--panel2);
}

/* SIDE LABEL */
.side{
    writing-mode:vertical-rl;
    transform:rotate(180deg);

    font-size:calc(3.5rem * var(--scale));
    opacity:0.2;

    padding:calc(10px * var(--scale));
}

/* CONTENT */
.content{
    flex:1;
    padding:calc(16px * var(--scale));
}

/* HABITS */
.habit{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:calc(8px * var(--scale));
    margin-bottom:calc(6px * var(--scale));

    cursor:pointer;
    transition:0.15s;
}

.habit:hover{
    transform:translateX(6px);
}

.habit.done{
    color:var(--gold);
}

.check{
    width:calc(14px * var(--scale));
    height:calc(14px * var(--scale));
    border:2px solid var(--panel);
}

.check.filled{
    background:var(--gold);
    border-color:var(--gold);
}

/* PROGRESS */
.progress{
    height:6px;
    background:#6fa8e6;
    margin-top:10px;
}

.fill{
    height:100%;
    background:var(--gold);
    width:0%;
}

/* BUTTONS */
.actions{
    margin-top:10px;
    display:flex;
    gap:8px;
}

button{
    border:none;
    cursor:pointer;
    padding:calc(8px * var(--scale));
    background:var(--panel);
    color:white;
    font-size:calc(0.9rem * var(--scale));
}

button:hover{
    background:#042a48;
}

</style>
</head>

<body>

<div class="app">

    <div class="top">
        <div id="date"></div>
        <div id="percent"></div>
    </div>

    <div class="panel">

        <div class="side">DAILY</div>

        <div class="content">

            <div id="list"></div>

            <div class="progress">
                <div class="fill" id="fill"></div>
            </div>

            <div class="actions">
                <button onclick="addHabit()">Add</button>
                <button onclick="resetDay()">Reset</button>
            </div>

        </div>

    </div>

</div>

<script>

/* ======================
   DATE SYSTEM (REAL DAILY)
====================== */

const today = new Date().toISOString().split("T")[0];

const monthNames = [
"Jan","Feb","Mar","Apr","May","Jun",
"Jul","Aug","Sep","Oct","Nov","Dec"
];

document.getElementById("date").textContent =
`${monthNames[new Date().getMonth()]} ${new Date().getDate()}`;

/* ======================
   STORAGE
====================== */

let data =
JSON.parse(localStorage.getItem("p3p_daily")) || {};

if(!data[today]){
    data[today] = {
        habits:["Exercise","Read","Study"],
        done:{}
    };
}

let day = data[today];

/* ======================
   SAVE
====================== */

function save(){
    localStorage.setItem("p3p_daily", JSON.stringify(data));
}

/* ======================
   RENDER
====================== */

function render(){

    const list = document.getElementById("list");
    list.innerHTML = "";

    let completed = 0;

    day.habits.forEach((h,i)=>{

        const isDone = day.done[h];

        if(isDone) completed++;

        const div = document.createElement("div");
        div.className = "habit" + (isDone ? " done" : "");

        div.innerHTML = `
            <div>${isDone ? "✓ " : ""}${h}</div>
            <div class="check ${isDone ? "filled" : ""}"></div>
        `;

        div.onclick = ()=>{

            day.done[h] = !day.done[h];
            save();
            render();

        };

        list.appendChild(div);

    });

    const percent =
    Math.round((completed / day.habits.length) * 100) || 0;

    document.getElementById("percent").textContent =
    `${percent}%`;

    document.getElementById("fill").style.width =
    percent + "%";

}

/* ======================
   ADD HABIT
====================== */

function addHabit(){

    const name = prompt("New Habit:");

    if(!name) return;

    day.habits.push(name);
    save();
    render();

}

/* ======================
   RESET DAY
====================== */

function resetDay(){

    day.done = {};
    save();
    render();

}

/* ======================
   INIT
====================== */

render();

</script>

</body>
</html>
